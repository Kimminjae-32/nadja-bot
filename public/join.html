<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내전 참가 신청</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --border: #2a2a4a;
            --accent: #e94560;
            --accent2: #0f3460;
            --text: #e0e0f0;
            --muted: #8888aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container { width: 100%; max-width: 480px; }
        h1 { font-size: 1.6rem; margin-bottom: .3rem; }
        .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1.8rem; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .field { margin-bottom: 1.4rem; }
        .field:last-child { margin-bottom: 0; }
        label {
            display: block;
            font-size: .8rem;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: .45rem;
        }
        input[type="text"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: .75rem 1rem;
            font-size: 1rem;
            outline: none;
            transition: border-color .2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        .positions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .5rem;
        }
        .pos-btn {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: .7rem .5rem;
            cursor: pointer;
            text-align: center;
            transition: border-color .15s, background .15s;
            font-size: .9rem;
            line-height: 1.3;
        }
        .pos-icon { width: 36px; height: 36px; display: block; margin: 0 auto .2rem; object-fit: contain; }
        .pos-btn:hover { border-color: var(--accent); }
        .pos-btn.on { background: var(--accent2); border-color: var(--accent); color: #fff; }
        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: .9rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
            margin-top: 1.2rem;
        }
        .submit-btn:hover { opacity: .85; }
        .submit-btn:disabled { opacity: .45; cursor: not-allowed; }
        .err { color: var(--accent); font-size: .85rem; margin-top: .6rem; display: none; }
        .success {
            background: #122212;
            border: 1px solid #2a4a2a;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            display: none;
        }
        .success h2 { color: #4caf50; margin-bottom: .75rem; }
        .success p { color: var(--muted); margin-bottom: 1.2rem; }
        .manage-link {
            display: inline-block;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .7rem 1.5rem;
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            transition: border-color .2s;
        }
        .manage-link:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <h1 id="page-title">⚔️ 내전 참가 신청</h1>
    <p class="subtitle">아래 정보를 입력하고 참가 신청을 완료하세요.</p>

    <div id="form-wrap">
        <div class="card">
            <div class="field">
                <label for="dn">디스코드 닉네임</label>
                <input type="text" id="dn" placeholder="디스코드 표시 이름" autocomplete="off">
            </div>
            <div class="field">
                <label for="in">인게임 닉네임</label>
                <input type="text" id="in" placeholder="이터널 리턴 인게임 닉네임" autocomplete="off">
            </div>
            <div class="field">
                <label>선호 포지션</label>
                <div class="positions">
                    <button type="button" class="pos-btn" data-pos="탱커"><img src="/icons/tank.png" class="pos-icon" onerror="this.style.display='none'">탱커</button>
                    <button type="button" class="pos-btn" data-pos="전사"><img src="/icons/warrior.png" class="pos-icon" onerror="this.style.display='none'">전사</button>
                    <button type="button" class="pos-btn" data-pos="암살자"><img src="/icons/assassin.png" class="pos-icon" onerror="this.style.display='none'">암살자</button>
                    <button type="button" class="pos-btn" data-pos="스킬 딜러"><img src="/icons/skill.png" class="pos-icon" onerror="this.style.display='none'">스킬 딜러</button>
                    <button type="button" class="pos-btn" data-pos="원거리 딜러"><img src="/icons/range.png" class="pos-icon" onerror="this.style.display='none'">원거리 딜러</button>
                    <button type="button" class="pos-btn" data-pos="지원가"><img src="/icons/support.png" class="pos-icon" onerror="this.style.display='none'">지원가</button>
                </div>
            </div>
            <p class="err" id="err"></p>
            <button type="button" class="submit-btn" id="submit-btn">참가 신청</button>
        </div>
    </div>

    <div id="admin-banner" style="display:none;margin-bottom:1rem">
        <a id="admin-link" href="#" class="manage-link" style="display:block;text-align:center;background:#0f3460;border-color:#e94560;color:#e0e0f0">
            ⚙️ 내전 관리자 페이지 열기
        </a>
    </div>

    <div class="success" id="success">
        <h2 id="success-title">✅ 참가 신청 완료!</h2>
        <p id="success-msg">참가 신청이 성공적으로 접수되었습니다.</p>
        <a href="#" id="manage-link" class="manage-link">✏️ 수정 / 취소하기</a>
    </div>
</div>

<script>
    const params    = new URLSearchParams(location.search);
    const eventId   = params.get('event');
    const editToken = params.get('token');
    const discordId = params.get('discord_id');
    let selectedPos = '';

    // 방장 여부 확인 → 관리자 버튼 표시
    if (eventId && discordId) {
        fetch(`/api/is-admin?event=${eventId}&discord_id=${discordId}`)
            .then(r => r.json())
            .then(d => {
                if (d.isAdmin) {
                    document.getElementById('admin-link').href = d.adminUrl;
                    document.getElementById('admin-banner').style.display = 'block';
                }
            }).catch(() => {});
    }

    if (editToken) {
        document.getElementById('page-title').textContent = '✏️ 참가 정보 수정';
        document.getElementById('submit-btn').textContent = '수정하기';
        fetch(`/api/participant?token=${editToken}`)
            .then(r => r.json())
            .then(d => {
                if (d.discord_nickname) document.getElementById('dn').value = d.discord_nickname;
                if (d.ingame_nickname)  document.getElementById('in').value = d.ingame_nickname;
                if (d.position) selectPos(d.position);
            }).catch(() => {});
    }

    document.querySelectorAll('.pos-btn').forEach(btn => {
        btn.addEventListener('click', () => selectPos(btn.dataset.pos));
    });

    function selectPos(pos) {
        selectedPos = pos;
        document.querySelectorAll('.pos-btn').forEach(b => b.classList.toggle('on', b.dataset.pos === pos));
    }

    document.getElementById('submit-btn').addEventListener('click', async () => {
        const dn  = document.getElementById('dn').value.trim();
        const inn = document.getElementById('in').value.trim();
        const err = document.getElementById('err');

        if (!dn || !inn || !selectedPos) {
            err.textContent = '모든 항목을 입력해주세요.';
            err.style.display = 'block';
            return;
        }
        err.style.display = 'none';

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = '처리 중...';

        const body = new URLSearchParams({ event: eventId, discord_nickname: dn, ingame_nickname: inn, position: selectedPos });
        if (editToken) body.append('token', editToken);
        if (discordId) body.append('discord_id', discordId);

        try {
            const res  = await fetch('/join', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
            const data = await res.json();
            if (data.success) {
                document.getElementById('form-wrap').style.display = 'none';
                const sc = document.getElementById('success');
                sc.style.display = 'block';
                document.getElementById('manage-link').href = `/cancel?token=${data.cancel_token}`;
                if (data.updated) {
                    document.getElementById('success-title').textContent = '✅ 수정 완료!';
                    document.getElementById('success-msg').textContent = '참가 정보가 업데이트되었습니다.';
                }
            } else {
                err.textContent = data.error || '오류가 발생했습니다.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = editToken ? '수정하기' : '참가 신청';
            }
        } catch (e) {
            err.textContent = '서버 오류가 발생했습니다.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = editToken ? '수정하기' : '참가 신청';
        }
    });
</script>
</body>
</html>
