<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내전 관리자</title>
    <style>
        :root { --bg:#0f0f1a; --card:#1a1a2e; --border:#2a2a4a; --accent:#e94560; --accent2:#0f3460; --text:#e0e0f0; --muted:#8888aa; --green:#2ecc71; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:1.5rem 1rem;}
        .container{max-width:960px;margin:0 auto;}
        h1{font-size:1.5rem;margin-bottom:.25rem;}
        .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;}
        .stats-row{display:flex;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap;}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.2rem;text-align:center;}
        .stat-num{font-size:1.6rem;font-weight:700;}
        .stat-label{font-size:.75rem;color:var(--muted);}
        .actions{display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .btn{border:none;border-radius:8px;padding:.65rem 1.2rem;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
        .btn:hover{opacity:.85;}
        .btn:disabled{opacity:.4;cursor:not-allowed;}
        .btn-primary{background:var(--accent);color:#fff;}
        .btn-secondary{background:var(--accent2);color:#fff;border:1px solid var(--accent);}
        .btn-success{background:#27ae60;color:#fff;}
        .btn-danger{background:#c0392b;color:#fff;}
        .btn-sm{padding:.35rem .75rem;font-size:.8rem;}
        .tabs{display:flex;gap:.5rem;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;}
        .tab{background:none;border:none;color:var(--muted);cursor:pointer;padding:.5rem 1rem;border-radius:6px 6px 0 0;font-size:.9rem;}
        .tab.active{background:var(--card);color:var(--text);border:1px solid var(--border);border-bottom:none;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:.65rem .75rem;text-align:left;border-bottom:1px solid var(--border);font-size:.88rem;}
        th{color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;}
        tr:hover td{background:rgba(255,255,255,.03);}
        .pos-badge{display:inline-flex;align-items:center;gap:.3rem;background:var(--accent2);border:1px solid #1a4a80;border-radius:5px;padding:.2rem .5rem;font-size:.8rem;white-space:nowrap;}
        .team-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.3rem .5rem;font-size:.85rem;cursor:pointer;}
        .team-select:focus{outline:none;border-color:var(--accent);}
        .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
        .team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;}
        .team-card h3{font-size:.95rem;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
        .member-item{padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.85rem;}
        .member-item:last-child{border-bottom:none;}
        .member-name{font-weight:600;}
        .member-sub{color:var(--muted);font-size:.78rem;}
        .unassigned{background:#2a1a1a;border-color:#4a2a2a;}
        .loading{text-align:center;padding:3rem;color:var(--muted);}
        .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#27ae60;color:#fff;padding:.75rem 1.2rem;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
        .toast.show{opacity:1;}
        .toast.error{background:var(--accent);}
        select option{background:#1a1a2e;}

        /* ── 밴픽 ── */
        .section-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-top:1.5rem;}
        .section-title{font-size:1.05rem;font-weight:700;margin-bottom:.3rem;}
        .section-sub{color:var(--muted);font-size:.82rem;margin-bottom:.85rem;}
        .ban-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:.35rem;}
        .ban-char{background:var(--bg);border:2px solid var(--border);border-radius:6px;padding:.3rem .35rem;font-size:.78rem;cursor:pointer;text-align:center;transition:all .15s;user-select:none;}
        .ban-char:hover{border-color:var(--accent);}
        .ban-char.banned{background:#2a0a0a;border-color:var(--accent);color:var(--accent);text-decoration:line-through;}
        #ban-count{color:var(--accent);font-size:.82rem;margin-bottom:.6rem;}

        /* ── 드래프트 ── */
        .captain-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem;}
        .captain-label{min-width:36px;font-size:.85rem;color:var(--muted);}
        .draft-link-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:7px;margin-bottom:.35rem;flex-wrap:wrap;}
        .draft-link-name{font-size:.85rem;white-space:nowrap;}
        .draft-link-url{flex:1;font-size:.78rem;color:var(--muted);word-break:break-all;min-width:0;}
        .draft-progress-bar{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;margin-bottom:.75rem;font-size:.9rem;}
        .pick-log-item{padding:.3rem 0;border-bottom:1px solid var(--border);font-size:.85rem;}
        .pick-log-item:last-child{border-bottom:none;}
    </style>
</head>
<body>
<div class="container">
    <h1>⚙️ 내전 관리자</h1>
    <p class="subtitle" id="subtitle">로딩 중...</p>

    <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">총 참가자</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-assigned">-</div><div class="stat-label">팀 배정됨</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-teams">-</div><div class="stat-label">팀 수</div></div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" id="shuffle-btn">🎲 자동 배정</button>
        <button class="btn btn-secondary" id="char-btn">🃏 실험체 랜덤 배정</button>
        <button class="btn btn-success" id="send-btn">📤 디스코드에 결과 전송</button>
        <button class="btn btn-danger" id="close-btn">🗑️ 모집 종료</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="list">전체 목록</button>
        <button class="tab" data-tab="teams">팀별 보기</button>
    </div>

    <div id="view-list">
        <div class="loading" id="list-loading">불러오는 중...</div>
        <table id="participants-table" style="display:none">
            <thead><tr><th>디스코드</th><th>인게임</th><th>포지션</th><th>팀 배정</th><th>삭제</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="view-teams" style="display:none">
        <div class="teams-grid" id="teams-grid"></div>
    </div>

    <!-- 실험체 배정 결과 -->
    <div id="char-results" style="display:none;margin-top:1.5rem">
        <h2 style="font-size:1.1rem;margin-bottom:.75rem">🃏 실험체 배정 결과</h2>
        <div class="teams-grid" id="char-grid"></div>
    </div>

    <!-- 캐릭터 밴픽 섹션 -->
    <div id="ban-section" class="section-card" style="display:none">
        <div class="section-title">🚫 캐릭터 밴</div>
        <div class="section-sub">클릭하여 밴/언밴 · 밴된 캐릭터는 실험체 랜덤 배정에서 제외돼요</div>
        <div id="ban-count"></div>
        <div class="ban-grid" id="ban-grid"></div>
    </div>

    <!-- 드래프트 섹션 -->
    <div id="draft-section" class="section-card" style="display:none">
        <div class="section-title">🎯 팀경매(드래프트)</div>
        <div class="section-sub">팀별 팀장을 지정하면 각자 픽 링크를 받아요</div>

        <!-- 팀장 선택 UI -->
        <div id="draft-setup">
            <div id="captain-rows" style="margin-bottom:.75rem"></div>
            <button class="btn btn-secondary" id="draft-start-btn">🎯 드래프트 시작</button>
        </div>

        <!-- 진행 상황 -->
        <div id="draft-status" style="display:none">
            <div class="draft-progress-bar" id="draft-progress-text">로딩 중...</div>
            <div style="font-size:.9rem;font-weight:600;margin:.75rem 0 .4rem">🔗 팀장 픽 링크</div>
            <div id="draft-links"></div>
            <div style="font-size:.9rem;font-weight:600;margin:.75rem 0 .4rem">📋 픽 기록</div>
            <div id="draft-pick-log" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;min-height:3rem"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
const EVENT  = params.get('event');
const TOKEN  = params.get('token');
const POS_ICON = { '탱커':'tank','전사':'warrior','암살자':'assassin','스킬 딜러':'skill','원거리 딜러':'range','지원가':'support' };
const TEAM_COLORS = ['#3498db','#e74c3c','#2ecc71','#f1c40f','#9b59b6','#e67e22','#95a5a6','#1abc9c'];
const EMOJIS = ['🟦','🟥','🟩','🟨','🟪','🟧','⬜','🟫'];
const CHARACTERS = ['재키','아야','현우','매그너스','피오라','나딘','자히르','하트','아이솔','리 다이린','유키','혜진','쇼우','시셀라','키아라','아드리아나','쇼이치','실비아','엘마','레녹스','로지','루크','캐시','아델라','버니스','바바라','알렉스','수아','레온','일레븐','리오','윌리엄','니키','나타폰','안','이바','다니엘','제니','카밀로','클로에','요한','비앙카','셀린','에키온','마이','에이든','라우라','띠아','펠릭스','엘레나','프리야','아디나','마커스','칼라','에스텔','피올로','마르티나','헤이즈','아이작','타지아','이렘','테오도르','이안','바냐','데비&마를렌','아르다','아비게일','알론소','레니','초바메','케네스','카티야','샬럿','다르코','르노어','가넷','유민','히스이','유스티나','아슈트반','니아','슈린','헨리','블레어','미르카','펜리르','코렐라인','비형'];

function posImg(position) {
    const f = POS_ICON[position];
    return f ? `<img src="/icons/${f}.png" style="width:18px;height:18px;vertical-align:middle;margin-right:3px;" onerror="this.style.display='none'">` : '';
}

let eventData = null;
let participants = [];
let bannedCharacters = [];
let draftPoll = null;

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, isError=false){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (isError?' error':'');
    clearTimeout(el._t);
    el._t = setTimeout(()=>el.classList.remove('show'),2500);
}

async function api(url, body=null){
    const opts = body
        ? { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }
        : { method:'GET' };
    const res = await fetch(url, opts);
    return res.json();
}

async function load(){
    const data = await api(`/api/admin/data?event=${EVENT}&token=${TOKEN}`);
    if(data.error){ document.getElementById('subtitle').textContent='오류: '+data.error; return; }
    eventData = data.event;
    participants = data.participants;
    bannedCharacters = eventData?.bannedCharacters || [];

    const isTeamMode = eventData?.gameType === '내전';
    document.getElementById('shuffle-btn').style.display = isTeamMode ? '' : 'none';
    document.getElementById('ban-section').style.display = isTeamMode ? '' : 'none';
    document.getElementById('draft-section').style.display = isTeamMode ? '' : 'none';

    if(isTeamMode){
        renderBanGrid();
        renderCaptainRows();

        // 드래프트 이미 진행 중이면 바로 상태 패널 표시
        const ds = await api(`/api/admin/draft/status?event=${EVENT}&token=${TOKEN}`);
        if(ds.status === 'in_progress' || ds.status === 'completed'){
            document.getElementById('draft-setup').style.display='none';
            document.getElementById('draft-status').style.display='block';
            if(ds.captainLinks) renderDraftLinks(ds.captainLinks);
            renderPickLog(ds.picks||[]);
            updateDraftProgress(ds);
            if(ds.status === 'in_progress'){
                draftPoll = setInterval(pollDraftStatus, 3000);
            }
        }
    }

    document.getElementById('subtitle').textContent = `이벤트 ID: ${EVENT}`;
    render();
}

function render(){
    const assigned = participants.filter(p=>p.team_num).length;
    document.getElementById('stat-total').textContent    = participants.length;
    document.getElementById('stat-assigned').textContent = assigned;
    document.getElementById('stat-teams').textContent    = eventData?.teamCount || 2;
    renderTable();
    renderTeams();
}

function teamOptions(current, teamCount){
    let html = `<option value="">미배정</option>`;
    for(let i=1;i<=teamCount;i++){
        html += `<option value="${i}" ${current==i?'selected':''}>${i}팀</option>`;
    }
    return html;
}

function renderTable(){
    const tc = eventData?.teamCount || 2;
    const isTeamMode = eventData?.gameType === '내전';
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = participants.map(p=>`
        <tr data-token="${esc(p.cancel_token)}">
            <td><strong>${esc(p.discord_nickname)}</strong></td>
            <td>${esc(p.ingame_nickname)}</td>
            <td>${p.position?`<span class="pos-badge">${posImg(p.position)}${esc(p.position)}</span>`:''}</td>
            <td>
                ${isTeamMode
                    ? `<select class="team-select" onchange="assignTeam('${esc(p.cancel_token)}', this.value)">${teamOptions(p.team_num, tc)}</select>`
                    : '<span style="color:var(--muted)">-</span>'
                }
            </td>
            <td><button class="btn btn-danger btn-sm" onclick="removeMember('${esc(p.cancel_token)}')">삭제</button></td>
        </tr>
    `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem">참가자가 없어요</td></tr>';
    document.getElementById('list-loading').style.display='none';
    document.getElementById('participants-table').style.display='table';
}

function renderTeams(){
    const tc = eventData?.teamCount || 2;
    const teams = {};
    for(let i=1;i<=tc;i++) teams[i]=[];
    const unassigned=[];
    for(const p of participants){
        if(p.team_num && teams[p.team_num]) teams[p.team_num].push(p);
        else unassigned.push(p);
    }
    const grid = document.getElementById('teams-grid');
    let html='';
    for(let i=1;i<=tc;i++){
        const color = TEAM_COLORS[(i-1)%TEAM_COLORS.length];
        html+=`<div class="team-card"><h3 style="color:${color}">${i}팀 (${teams[i].length}명)</h3>`;
        if(!teams[i].length) html+='<p style="color:var(--muted);font-size:.85rem">없음</p>';
        for(const p of teams[i]) html+=`
            <div class="member-item">
                <div class="member-name">${esc(p.discord_nickname)}</div>
                <div class="member-sub">${esc(p.ingame_nickname)}${p.position?` · ${posImg(p.position)}${esc(p.position)}`:''}  </div>
            </div>`;
        html+='</div>';
    }
    if(unassigned.length){
        html+=`<div class="team-card unassigned"><h3 style="color:var(--muted)">❓ 미배정 (${unassigned.length}명)</h3>`;
        for(const p of unassigned) html+=`<div class="member-item"><div class="member-name">${esc(p.discord_nickname)}</div></div>`;
        html+='</div>';
    }
    grid.innerHTML = html || '<p style="color:var(--muted)">참가자가 없어요</p>';
}

async function assignTeam(cancelToken, teamNum){
    await api('/api/admin/assign', { event:EVENT, token:TOKEN, cancel_token:cancelToken, team_num:teamNum });
    const p = participants.find(x=>x.cancel_token===cancelToken);
    if(p) p.team_num = teamNum===''? null : Number(teamNum);
    renderTeams();
    toast('팀 배정 저장됨');
}

async function removeMember(cancelToken){
    if(!confirm('이 참가자를 삭제할까요?')) return;
    await api('/api/admin/remove', { event:EVENT, token:TOKEN, cancel_token:cancelToken });
    participants = participants.filter(p=>p.cancel_token!==cancelToken);
    render();
    toast('삭제됐어요');
}

// ── 캐릭터 밴 ────────────────────────────────────────────
function renderBanGrid(){
    const grid = document.getElementById('ban-grid');
    grid.innerHTML = CHARACTERS.map(c=>`
        <div class="ban-char${bannedCharacters.includes(c)?' banned':''}" onclick="toggleBan(this,'${esc(c)}')">${esc(c)}</div>
    `).join('');
    const cnt = document.getElementById('ban-count');
    cnt.textContent = bannedCharacters.length ? `밴 ${bannedCharacters.length}개` : '';
}

async function toggleBan(el, character){
    const action = bannedCharacters.includes(character) ? 'unban' : 'ban';
    const data = await api('/api/admin/char-ban', { event:EVENT, token:TOKEN, character, action });
    if(data.success){
        bannedCharacters = data.bannedCharacters;
        el.classList.toggle('banned', bannedCharacters.includes(character));
        const cnt = document.getElementById('ban-count');
        cnt.textContent = bannedCharacters.length ? `밴 ${bannedCharacters.length}개` : '';
    }
}

// ── 드래프트 ─────────────────────────────────────────────
function renderCaptainRows(){
    const tc = eventData?.teamCount || 2;
    const rows = document.getElementById('captain-rows');
    rows.innerHTML = '';
    for(let i=1; i<=tc; i++){
        const row = document.createElement('div');
        row.className = 'captain-row';
        const opts = participants.map(p=>`<option value="${esc(p.cancel_token)}">${esc(p.discord_nickname)} (${esc(p.ingame_nickname)})</option>`).join('');
        row.innerHTML = `
            <span class="captain-label">${EMOJIS[(i-1)%EMOJIS.length]} ${i}팀</span>
            <select class="team-select" id="captain-${i}" style="flex:1">
                <option value="">-- 팀장 선택 --</option>
                ${opts}
            </select>`;
        rows.appendChild(row);
    }
}

function renderDraftLinks(links){
    document.getElementById('draft-links').innerHTML = links.map(l=>`
        <div class="draft-link-item">
            <span class="draft-link-name">${EMOJIS[(l.teamNum-1)%EMOJIS.length]} <strong>${l.teamNum}팀</strong> · ${esc(l.discordNickname)}</span>
            <span class="draft-link-url">${esc(l.draftUrl)}</span>
            <button class="btn btn-secondary btn-sm" onclick="copyUrl('${esc(l.draftUrl)}')">복사</button>
        </div>`).join('');
}

function renderPickLog(picks){
    const el = document.getElementById('draft-pick-log');
    if(!picks.length){ el.innerHTML='<span style="color:var(--muted);font-size:.85rem">아직 픽이 없어요</span>'; return; }
    el.innerHTML = picks.map(p=>`
        <div class="pick-log-item">
            ${EMOJIS[(p.teamNum-1)%EMOJIS.length]} <strong>${p.teamNum}팀</strong>
            → ${esc(p.discordNickname)} (${esc(p.ingameNickname)})
        </div>`).join('');
}

function updateDraftProgress(ds){
    const el = document.getElementById('draft-progress-text');
    if(ds.status === 'completed'){
        el.innerHTML = `✅ 드래프트 완료! (총 ${ds.donePicks}픽)`;
        el.style.color = 'var(--green)';
    } else {
        el.innerHTML = `⏳ 진행 중: ${ds.donePicks}/${ds.totalPicks}픽 · 현재 <strong>${EMOJIS[(ds.currentTeam-1)%EMOJIS.length]} ${ds.currentTeam}팀</strong> 차례`;
    }
}

function copyUrl(url){
    navigator.clipboard.writeText(url).then(()=>toast('링크 복사됨!')).catch(()=>toast('복사 실패', true));
}

async function pollDraftStatus(){
    const data = await api(`/api/admin/draft/status?event=${EVENT}&token=${TOKEN}`);
    if(data.error || data.status==='idle') return;
    updateDraftProgress(data);
    if(data.captainLinks) renderDraftLinks(data.captainLinks);
    renderPickLog(data.picks||[]);
    if(data.status==='completed'){ clearInterval(draftPoll); draftPoll=null; }
}

document.getElementById('draft-start-btn').addEventListener('click', async ()=>{
    const tc = eventData?.teamCount || 2;
    const captains = [];
    for(let i=1;i<=tc;i++){
        const sel = document.getElementById(`captain-${i}`);
        if(!sel?.value){ toast(`${i}팀 팀장을 선택해주세요`, true); return; }
        captains.push({ teamNum: i, participantToken: sel.value });
    }
    const tokenSet = captains.map(c=>c.participantToken);
    if(new Set(tokenSet).size !== tokenSet.length){ toast('같은 사람을 여러 팀 팀장으로 지정할 수 없어요', true); return; }

    const btn = document.getElementById('draft-start-btn');
    btn.disabled=true;
    const data = await api('/api/admin/draft/start', { event:EVENT, token:TOKEN, captains });
    btn.disabled=false;
    if(data.error){ toast('드래프트 시작 실패: '+data.error, true); return; }

    document.getElementById('draft-setup').style.display='none';
    document.getElementById('draft-status').style.display='block';
    renderDraftLinks(data.captainLinks);
    document.getElementById('draft-pick-log').innerHTML='<span style="color:var(--muted);font-size:.85rem">아직 픽이 없어요</span>';
    document.getElementById('draft-progress-text').textContent='⏳ 드래프트 시작됨';
    toast('드래프트 시작!');
    if(draftPoll) clearInterval(draftPoll);
    draftPoll = setInterval(pollDraftStatus, 3000);
});

// ── 기존 버튼들 ──────────────────────────────────────────
document.getElementById('shuffle-btn').addEventListener('click', async ()=>{
    if(!confirm(`참가자 ${participants.length}명을 ${eventData?.teamCount||2}팀으로 자동 배정할까요?`)) return;
    const btn = document.getElementById('shuffle-btn');
    btn.disabled=true;
    const data = await api('/api/admin/shuffle', { event:EVENT, token:TOKEN });
    participants = data.participants;
    render();
    btn.disabled=false;
    toast('자동 배정 완료!');
});

document.getElementById('char-btn').addEventListener('click', async ()=>{
    const assigned = participants.filter(p=>p.team_num);
    if(!assigned.length){ toast('팀 배정 먼저 해주세요!', true); return; }
    const btn = document.getElementById('char-btn');
    btn.disabled=true;
    const data = await api('/api/admin/random-chars', { event:EVENT, token:TOKEN });
    btn.disabled=false;
    if(data.error){ toast('오류: '+data.error, true); return; }

    const tc = eventData?.teamCount || 2;
    const teams = {};
    for(let i=1;i<=tc;i++) teams[i]=[];
    for(const a of data.assignments){
        if(teams[a.team_num]) teams[a.team_num].push(a);
    }
    let html='';
    for(let i=1;i<=tc;i++){
        if(!teams[i].length) continue;
        const color = TEAM_COLORS[(i-1)%TEAM_COLORS.length];
        html+=`<div class="team-card"><h3 style="color:${color}">${i}팀</h3>`;
        for(const a of teams[i]){
            html+=`<div class="member-item">
                <div class="member-name">${esc(a.discord_nickname)}</div>
                <div class="member-sub">${esc(a.ingame_nickname)} → <strong style="color:#e0e0f0">${esc(a.character)}</strong></div>
            </div>`;
        }
        html+='</div>';
    }
    const charResults = document.getElementById('char-results');
    document.getElementById('char-grid').innerHTML = html;
    const msg = data.bannedCount ? ` (밴 ${data.bannedCount}개 제외)` : '';
    charResults.style.display='block';
    charResults.scrollIntoView({ behavior:'smooth' });
    toast(`실험체 배정 완료!${msg}`);
});

document.getElementById('send-btn').addEventListener('click', async ()=>{
    const assigned = participants.filter(p=>p.team_num).length;
    if(!assigned){ toast('팀 배정 먼저 해주세요!', true); return; }
    if(!confirm('현재 팀 배정 결과를 디스코드 채널에 전송할까요?')) return;
    const btn = document.getElementById('send-btn');
    btn.disabled=true;
    const data = await api('/api/admin/send-discord', { event:EVENT, token:TOKEN });
    btn.disabled=false;
    data.success ? toast('디스코드에 전송됐어요!') : toast('전송 실패: '+data.error, true);
});

document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('view-list').style.display  = tab.dataset.tab==='list'  ?'block':'none';
        document.getElementById('view-teams').style.display = tab.dataset.tab==='teams' ?'block':'none';
    });
});

document.getElementById('close-btn').addEventListener('click', async ()=>{
    if(!confirm('모집을 종료하면 디스코드 메시지가 삭제됩니다. 계속할까요?')) return;
    const btn = document.getElementById('close-btn');
    btn.disabled=true;
    const data = await api('/api/admin/close', { event:EVENT, token:TOKEN });
    if(data.success){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f0f1a;color:#e0e0f0;font-family:sans-serif;font-size:1.2rem">✅ 모집이 종료됐어요.</div>';
    } else {
        toast('종료 실패: '+(data.error||'알 수 없는 오류'), true);
        btn.disabled=false;
    }
});

// 실시간 폴링 (5초마다 참가자 데이터 갱신)
async function silentRefresh(){
    try {
        const data = await api(`/api/admin/data?event=${EVENT}&token=${TOKEN}`);
        if(data.error || !data.participants) return;
        const newCount = data.participants.length;
        const oldCount = participants.length;
        participants = data.participants;
        eventData = data.event;
        bannedCharacters = eventData?.bannedCharacters || [];
        render();
        if(newCount !== oldCount) toast(`참가자 업데이트: ${newCount}명`);
        const now = new Date();
        document.getElementById('subtitle').textContent =
            `이벤트 ID: ${EVENT}　·　마지막 업데이트: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    } catch(e){}
}

load();
setInterval(silentRefresh, 5000);
</script>
</body>
</html>
